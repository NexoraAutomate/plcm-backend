# Development Docker Compose configuration.
# - Mounts source code for live development.
# - Enables Uvicorn reload for backend code changes.
# - Reuses the same backend image build but avoids rebuilding for every edit.

version: '3.9'

services:
  db:
    build:
      context: ./db
    container_name: satlife-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-plcm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - satlife_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plcm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    container_name: satlife-backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-plcm}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-to-a-long-random-string}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      PLCM_UPLOAD_DIR: ${PLCM_UPLOAD_DIR:-/app/uploads}
      BACKEND_RELOAD: "true"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - .:/app:delegated
      - satlife_uploads_dev:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app

volumes:
  satlife_pgdata_dev:
  satlife_uploads_dev:

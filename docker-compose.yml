# Full stack: database + backend + frontend.
# Frontend uses the existing plcm-frontend image (or rebuild from ../satlife-frontend-main).

services:
  db:
    build:
      context: ./db
    container_name: satlife-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-plcm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - satlife_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plcm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    container_name: satlife-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-plcm}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-to-a-long-random-string}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      CREATE_DEFAULT_ADMIN: ${CREATE_DEFAULT_ADMIN:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      PLCM_UPLOAD_DIR: ${PLCM_UPLOAD_DIR:-/app/uploads}
      BACKEND_RELOAD: "false"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - satlife_uploads:/app/uploads

  frontend:
    image: plcm-frontend:latest
    build:
      context: ../satlife-frontend-main
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: satlife-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  satlife_pgdata:
  satlife_uploads:
